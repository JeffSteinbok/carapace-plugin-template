name: Release

# Triggered manually from the GitHub Actions UI (Actions → Release → Run workflow).
# Delegates all version-bump, publish, and release logic to the shared
# carapace-plugin-sdk workflow — no release logic lives here.
#
# Required secret: NPM_TOKEN — an npm publish token stored in repo settings.

on:
  workflow_dispatch:
    inputs:
      version-bump:
        description: |
          Semver bump type:
            patch — bug fixes, no API changes (1.0.0 → 1.0.1)
            minor — new features, backwards compatible (1.0.0 → 1.1.0)
            major — breaking changes (1.0.0 → 2.0.0)
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch
      prerelease:
        description: |
          Pre-release label. Leave empty for a stable release.
          Prerelease versions publish under the label tag (e.g. "beta"), not "latest".
        required: false
        type: choice
        options: ["", alpha, beta, rc]
        default: ""

permissions:
  contents: read

jobs:
  release:
    uses: JeffSteinbok/carapace-plugin-sdk/.github/workflows/plugin-release.yml@main
    with:
      version-bump: ${{ inputs.version-bump }}
      prerelease: ${{ inputs.prerelease }}
    secrets:
      npm-token: ${{ secrets.NPM_TOKEN }}
